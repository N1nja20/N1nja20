<!DOCTYPE html>
<html>
<head>
    <title>N1nja's</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
body {
    height: 100vh;
    background: radial-gradient(circle at top, #111 0%, #000 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    color: white;

   
}
     .card {
            width: 420px;
            padding: 50px;
            border-radius: 25px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

       h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 15px;
    color: white;
}

.one {
    font-weight: 700;
}

.small {
    font-size: 18px;
    vertical-align: super;
    opacity: 0.6;
}

.one {
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.small {
    font-size: 20px;
    vertical-align: super;
    opacity: 0.8;
}

        .subtitle {
            font-size: 15px;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .btn {
    display: inline-block;
    padding: 14px 36px;
    border-radius: 100px;
    background: transparent;
    color: white;
    font-weight: 500;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.3s ease;
}

.btn:hover {
    background: white;
    color: black;
    border: 1px solid white;
}

       
        .footer {
            margin-top: 25px;
            font-size: 12px;
            opacity: 0.4;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>N1nja’s</h1>
    <div class="subtitle">web developer • space architect • future builder</div>
    <a href="profile.html" class="btn">Enter Profile</a>
    <div class="footer">DELWARA • INDIA</div>
</div>

</body>
</html>
