<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1nja</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1f2937, #111827);
    color: white;
}

/* Card */
.card {
    width: 90%;
    max-width: 420px;
    padding: 60px 40px;
    border-radius: 24px;
    text-align: center;
    background: #1c1c1c;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    animation: fadeUp 1s ease forwards;
    opacity: 0;
    transform: translateY(20px);
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: clamp(32px, 7vw, 52px);
    letter-spacing: 4px;
    margin-bottom: 15px;
}

p {
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 40px;
    letter-spacing: 1px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 14px 50px;
    border-radius: 50px;
    text-decoration: none;
    background: white;
    color: black;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn:hover {
    transform: translateY(-3px);
}
</style>
</head>

<body>

<div class="card">
    <h1>N1NJA</h1>
    <p>Welcome to the space. Build. Create. Grow.</p>
    <a href="profile.html" class="btn">ENTER</a>
</div>

</body>
</html>
