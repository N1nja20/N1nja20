<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #111827);
    color: white;
    padding: 20px;
}

/* Main Card */
.card {
    width: 100%;
    max-width: 480px;
    background: #1e293b;
    border-radius: 28px;
    padding: 40px 30px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
    transform: translateY(20px);
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Profile Image */
.pfp-wrapper {
    position: relative;
    width: 120px;
    margin-bottom: 20px;
}

.pfp {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #0f172a;
}

.status {
    position: absolute;
    bottom: 10px;
    right: 8px;
    width: 18px;
    height: 18px;
    background: #22c55e;
    border-radius: 50%;
    border: 3px solid #1e293b;
}

/* Text */
h1 {
    font-size: clamp(26px, 6vw, 34px);
    margin-bottom: 6px;
}

.username {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 20px;
}

.bio {
    font-size: 15px;
    line-height: 1.6;
    color: #cbd5e1;
    margin-bottom: 30px;
}

/* Buttons */
.button {
    display: block;
    text-align: center;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 15px;
    transition: 0.3s ease;
}

.game-btn {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
}

.spotify-btn {
    background: #22c55e;
    color: white;
}

.button:hover {
    transform: translateY(-3px);
}

/* Section Title */
.section-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: #94a3b8;
    margin: 25px 0 10px;
}

/* Connections */
.connection {
    background: #111827;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
}

/* Spotify Box */
.spotify-box {
    background: #111827;
    padding: 14px;
    border-radius: 14px;
    margin-top: 10px;
    font-size: 14px;
    color: #cbd5e1;
}
</style>
