<!DOCTYPE html>
<html>
<head>
<title>N1nja Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#1e1f22;
    color:white;
    display:flex;
    justify-content:center;
    padding:50px;
}

.profile-card{
    width:650px;
    background:#2b2d31;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    position:relative;
}

/* Banner */
.banner{
    height:200px;
    background:linear-gradient(135deg,#000000,#1a1a1a);
}

/* Avatar */
.avatar-wrapper{
    position:absolute;
    top:120px; /* FIXED POSITION */
    left:30px;
}

.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    border:6px solid #2b2d31;
    object-fit:cover;
    background:#111;
}

/* Online status */
.status{
    position:absolute;
    bottom:8px;
    right:8px;
    width:24px;
    height:24px;
    background:#23a55a;
    border-radius:50%;
    border:4px solid #2b2d31;
}

/* Content */
.profile-content{
    padding:90px 30px 30px 30px;
}

/* Name section */
.name h1{
    font-size:28px;
}

.username{
    color:#b5bac1;
    margin-top:4px;
    font-size:14px;
}

/* Bio */
.bio{
    margin-top:20px;
    font-size:15px;
    line-height:1.6;
}

/* Section */
.section{
    margin-top:30px;
}

.section-title{
    font-size:12px;
    color:#b5bac1;
    margin-bottom:12px;
    letter-spacing:1px;
}

/* Connections */
.connection{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.connection img{
    width:22px;
    height:22px;
}

/* Spotify */
.spotify-box{
    padding:15px;
    background:#1e1f22;
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:15px;
    transition:0.3s;
}

.spotify-box:hover{
    background:#232428;
}

.spotify-box img{
    width:60px;
    height:60px;
    border-radius:10px;
}

.spotify-info{
    font-size:14px;
}
.game-btn{
    display:inline-block;
    padding:12px 20px;
    background:#5865f2;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:0.3s;
}

.game-btn:hover{
    background:#4752c4;
}

.spotify-btn{
    display:inline-block;
    padding:12px 20px;
    background:#1db954;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:0.3s;
}

.spotify-btn:hover{
    background:#17a74a;
}
</style>
</head>

<body>
